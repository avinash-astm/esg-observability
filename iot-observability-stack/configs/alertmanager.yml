global:
  resolve_timeout: 5m
  smtp_from: 'prometheus-alerts@example.com'
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_auth_username: 'your-email@gmail.com'
  smtp_auth_password: 'your-app-password'

route:
  receiver: 'email-notifications'
  group_by: ['alertname', 'severity', 'component']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 24h
  routes:
    - match:
        severity: critical
      receiver: 'critical-email'
      group_wait: 5s
      repeat_interval: 1h
    - match:
        component: water_stewardship
      receiver: 'water-team-email'
      repeat_interval: 12h

receivers:
  - name: 'email-notifications'
    email_configs:
      - to: 'avinashvp@gmail.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'your-email@gmail.com'
        auth_password: 'your-app-password'
        from: 'prometheus-alerts@example.com'
        headers:
          Subject: '[{{ .GroupLabels.severity | toUpper }}] {{ .GroupLabels.alertname }} - Water SLO Alert'

  - name: 'critical-email'
    email_configs:
      - to: 'avinashvp@gmail.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'your-email@gmail.com'
        auth_password: 'your-app-password'
        from: 'prometheus-alerts@example.com'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} - Immediate Action Required'

  - name: 'water-team-email'
    email_configs:
      - to: 'avinashvp@gmail.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'your-email@gmail.com'
        auth_password: 'your-app-password'
        from: 'prometheus-alerts@example.com'
        headers:
          Subject: '[{{ .GroupLabels.severity | toUpper }}] Water Stewardship Alert: {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']
