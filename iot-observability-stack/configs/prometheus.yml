global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/prometheus-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:9090']  # Scrape metrics exported by the OpenTelemetry Collector
        labels:
          service: 'otel-collector'
  
  - job_name: 'iot-app'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'iot-app'
